name: Build and Push Frontend Docker Image

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/build-and-push-frontend.yml'

concurrency:
  group: ci-demo6-frontend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t ghcr.io/claivent/demo6-frontend:${{ env.TAG }} ./frontend
          docker push ghcr.io/claivent/demo6-frontend:${{ env.TAG }}

      - name: Update kustomization image tag
        run: |
          sed -i '/demo6-frontend/{n;s|newTag: .*|newTag: "${{ env.TAG }}"|}' \
            __demo6-gitops/argocd-deploy-kustomization/kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add __demo6-gitops/argocd-deploy-kustomization/kustomization.yaml
          git diff --cached --quiet || git commit -m "ci: deploy demo6-frontend:${{ env.TAG }}"
          git pull --rebase origin master
          git push
