name: Build and Push Docker Image

# Spustí se při každém push do větve main (nebo master)
on:
  push:
    branches:
      - master      
    paths:
      - 'demo6/**'
      - '.github/workflows/build-and-push.yml'

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write

    steps:
      # 1. Stáhni kód z repozitáře
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin


      - name: Build and push image
        run: |
          docker build -t ghcr.io/claivent/demo6:${{ env.TAG }} ./demo
          docker push ghcr.io/claivent/demo6:${{ env.TAG }}

      - name: Update kustomization image tag
        run: |
          sed -i 's|newTag: .*|newTag: "${{ env.TAG }}"|' \
            __demo6-gitops/argocd-deploy-kustomization/kustomization.yaml
          sed -i 's|value: "[0-9a-f]\{7,\}"\( *# APP_VERSION\)*|value: "${{ env.TAG }}"|' \
            __demo6-gitops/argocd-deploy-kustomization/patch-env.yaml


      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add __demo6-gitops/argocd-deploy-kustomization/kustomization.yaml \
                  __demo6-gitops/argocd-deploy-kustomization/patch-env.yaml
          git diff --cached --quiet || git commit -m "ci: deploy demo6:${{ env.TAG }}"
          git pull --rebase origin master
          git push

