name: Build and Push Docker Image

# Spustí se při každém push do větve main (nebo master)
on:
  push:
    branches:
      - main       # změň na "master" pokud používáš master

jobs:
  build:
    runs-on: ubuntu-latest   # GitHub poskytuje runner zdarma

    steps:
      # 1. Stáhni kód z repozitáře
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Přihlas se do GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # tvůj GitHub username
          password: ${{ secrets.GHCR_TOKEN }}    # PAT token z Kroku 2

      # 3. Získej krátký SHA commitu jako tag (např. "a1b2c3d")
      - name: Set image tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 4. Sestav a nahraj image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .           # složka kde je Dockerfile (. = kořen projektu)
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/praxe-demo6:${{ env.TAG }}
            ghcr.io/${{ github.repository_owner }}/praxe-demo6:latest