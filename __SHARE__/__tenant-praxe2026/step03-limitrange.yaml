# LimitRange zajistí, že každý pod musí mít resource requests/limits.
# Bez toho by pody bez definovaných limitů nešly spustit (ResourceQuota to vyžaduje).
apiVersion: v1
kind: LimitRange
metadata:
  name: praxe2026-limitrange
  namespace: praxe2026
spec:
  limits:
    - type: Container
      default:          # výchozí limit (pokud kontejner limit nespecifikuje)
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:   # výchozí request
        cpu: "100m"
        memory: "128Mi"
      max:              # maximální povolené limity na kontejner
        cpu: "4"
        memory: "8Gi"
      min:              # minimální povolené requests na kontejner
        cpu: "10m"
        memory: "16Mi"
