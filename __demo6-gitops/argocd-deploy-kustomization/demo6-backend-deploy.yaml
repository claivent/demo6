---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentor
  namespace: mentors
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mentor
  template:
    metadata:
      labels:
        app: mentor
    spec:
      containers:
        - name: demo
          image: ghcr.io/claivent/praxe-backend:latest
          ports:
            - containerPort: 9100
---
apiVersion: v1
kind: Service
metadata:
  name: mentor-backend
  namespace: mentors
spec:
  selector:
    app: mentor
  ports:
    - port: 80
      targetPort: 9100
