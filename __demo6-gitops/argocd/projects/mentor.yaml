apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mentors-demo6
  namespace: mentors
spec:
  sourceRepos:
    - "https://github.com/claivent/bacprac2026-app.git"
  destinations:
    - namespace: mentors
      server: https://kubernetes.default.svc
 # Namespace je cluster-scoped zdroj — musí být v clusterResourceWhitelist
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: "apps"
      kind: "*"
    - group: "batch"
      kind: "*"
    - group: "networking.k8s.io"
      kind: "*"
    - group: "traefik.io"
      kind: "*"
    - group: "rbac.authorization.k8s.io"
      kind: "*"      
 # Uživatelé projektu — svázáno s ArgoCD RBAC (viz argocd/values.yaml)
  roles:
    - name: developer
      description: "Plný přístup k aplikacím v projektu mentors"
      policies:
        - p, proj:mentors:developer, applications, *, mentors/*, allow
      groups: []