<div class="card">
  <h2>Přidat uživatele</h2>

  <form (ngSubmit)="addUser()">
    <div class="form-group">
      <label>Jméno</label>
      <input type="text" name="name" [(ngModel)]="name" required placeholder="Jan Novák">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" [(ngModel)]="email" required placeholder="jan@example.com">
    </div>
    <button type="submit" class="btn btn-primary">Přidat</button>
  </form>

  <p class="alert alert-success" *ngIf="message">{{ message }}</p>
  <p class="alert alert-error"   *ngIf="error">{{ error }}</p>
</div>
