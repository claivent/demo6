<div class="card">
  <h2>Upravit uživatele</h2>

  <form (ngSubmit)="modifyUser()">
    <div class="form-group">
      <label>ID uživatele</label>
      <input type="number" name="id" [(ngModel)]="id" required placeholder="1">
    </div>
    <div class="form-group">
      <label>Nové jméno <span style="font-weight:400;text-transform:none">(nepovinné)</span></label>
      <input type="text" name="name" [(ngModel)]="name" placeholder="Jan Novák">
    </div>
    <div class="form-group">
      <label>Nový email <span style="font-weight:400;text-transform:none">(nepovinné)</span></label>
      <input type="email" name="email" [(ngModel)]="email" placeholder="jan@example.com">
    </div>
    <button type="submit" class="btn btn-warning">Uložit změny</button>
  </form>

  <p class="alert alert-success" *ngIf="message">{{ message }}</p>
  <p class="alert alert-error"   *ngIf="error">{{ error }}</p>
</div>
