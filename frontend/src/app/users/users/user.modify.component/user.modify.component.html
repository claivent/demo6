<h2>Upravit uživatele</h2>

<form (ngSubmit)="modifyUser()">
  <div>
    <label>ID uživatele:</label>
    <input type="number" name="id" [(ngModel)]="id" required>
  </div>
  <div>
    <label>Nové jméno (nepovinné):</label>
    <input type="text" name="name" [(ngModel)]="name">
  </div>
  <div>
    <label>Nový email (nepovinné):</label>
    <input type="email" name="email" [(ngModel)]="email">
  </div>
  <button type="submit">Uložit změny</button>
</form>

<p style="color: green" *ngIf="message">{{ message }}</p>
<p style="color: red"   *ngIf="error">{{ error }}</p>
