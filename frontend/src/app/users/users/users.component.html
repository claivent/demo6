<div class="card">
  <h2>Uživatelé</h2>

  <p class="status-text" *ngIf="loading">Načítání...</p>
  <p class="alert alert-error" *ngIf="error">{{ error }}</p>

  <div class="table-wrapper" *ngIf="!loading && !error">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Jméno</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
